rename_node=苏黎世@瑞士


; ============================================
; 6. 强迫症排版修复 (打磨掉所有的毛刺)
; ============================================
; 清理标签后面残留的杂乱英文字母（比如 [牛] usus 美国 -> [牛] 美国）
