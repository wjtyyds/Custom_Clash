; ============================================
; 2. 机场精准分家 (严格依据v2rayN原生名称特征)
; ============================================
; 兜底防干扰：先清理掉可能残留的标签
rename_node=^\[[宝牛赔白]\]\s*@

; 【宝】特征：L1|, L2|, 福建专用, bbyvpn
rename_node=^([^\[].*(L1\||L2\||福建专用|bbyvpn).*)@[宝] $1

; 【赔】特征：推荐, 晚高峰, 合适下载, 专线-hy2, 0.1倍, KR韩国首尔01 (排除优化和解锁)
rename_node=^([^\[].*(推荐|避免晚高峰|合适下载|0\.1倍|0\.01倍|专线-hy2|KR韩国首尔01).*)@[赔] $1

; 【牛】特征：优化, 解锁, Google play, tuic, 家宽, HKAWS, 风凰城
rename_node=^([^\[].*(优化|流媒体解锁|Google play|tuic|家宽|HKAWS|风凰城).*)@[牛] $1

; 【白】特征：baipiaoyes, 白嫖, V666, 光速, 1000M, 稳定, 免流, 每月更, 小火箭, clashmeta
rename_node=(?i)^([^\[].*(baipiaoyes|白嫖|V666|光速|-1000M|稳定\d|免流|每月更|小火箭|clashmeta|clashverge|HY\d).*)@[白] $1
; 【白 - 兜底捕获】像 "JP日本1", "sg新加坡2", "MY马来西亚" 这种全裸无特征的，全归白嫖
rename_node=^([^\[]*(us美国|JP日本|sg新加坡|MY马来西亚|RU俄罗斯|IN印度)\d*)$@[白] $1


; ============================================
; 3. 提取核心参数 (倍率、中转直连)
; ============================================
rename_node=(?i)0\.1(倍|x)@ [0.1x]
rename_node=(?i)0\.01(倍|x)@ [0.01x]
rename_node=(?i)(\d+)x@ [$1x]
rename_node=(?i)(\d+)倍@ [$1x]
rename_node=中转@ 中转 
rename_node=直连|白连@ 直连 
rename_node=高速专线|专线@ 专线 


; ============================================
; 4. 终极粉碎机 (删掉所有废话和杂乱前缀)
; ============================================
; 删掉原生的机场前缀
rename_node=(?i)(L[12]\||福建专用|sgAWS|jpAWS|JPAWS|SGAWS|HKAWS)@
; 删掉所有的描述废话
rename_node=(?i)(流媒体解锁|流媒体|电信|移动|联通|三网|推荐|优化|解锁GPT|解锁台区.*|解锁|下载使用|下载|专用|晚高峰使用|避免晚高峰|避免|合适|家宽|AnyTLS|tuic|hy2|Al-hy2|-hy2|GPT|Netflix|Google play|光速|-1000M|V\d+|baipiaoyes\.top|baipiaoyes|-稳定\d|AI-|AI|小火箭能用HY|油管去广告)@
; 删掉原有的各种恶心竖杠、横杠
rename_node=\||-|\|@ 


; ============================================
; 5. 统一国家地区名字
; ============================================
