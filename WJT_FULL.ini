[custom]
; ============================================
; （前面的直连、分流规则保留你原来的，这里只放重命名部分）
; 终极无敌版流水线（精准分家 + 强迫症空格排版）
; ============================================

; --- 0. 修正：防止重复运行导致的标签叠加 ---
rename_node=^\[[宝牛赔白]\]\s*@

; --- 1. 第一步：精准分家 (严格按顺序，防止互相抢节点) ---
; 【白嫖】优先保护：只要带这些字眼，绝对是白嫖的，[牛]抢不走
rename_node=(?i)^([^\[].*(baipiaoyes|白嫖|V666|光速|1000M|稳定|免流|每月更|小火箭|ipv6|Shadowrocket|新一次订阅).*)@[白] $1

; 【宝贝云】特征：L1, L2, 福建, bbyvpn, 25%, 返佣
rename_node=(?i)^([^\[].*(L1\||L2\||福建专用|bbyvpn|返佣|25%).*)@[宝] $1

; 【赔钱】特征：大写AWS, 推荐, 晚高峰, 合适下载, 专线, 0.1x, 倍, KR韩国首尔01
rename_node=(?i)^([^\[].*([A-Z]{2}AWS|推荐|避免晚高峰|合适下载|专线|0\.1倍|0\.1x|KR韩国首尔01).*)@[赔] $1

; 【牛逼】特征：小写aws, 优化, 解锁, AnyTLS, tuic, HKT, 家宽, HKAWS, 风凰城
rename_node=(?i)^([^\[].*(优化|解锁|AnyTLS|tuic|HKT|家宽|HKAWS|风凰城|HK香港2快|[a-z]{2}AWS).*)@[牛] $1

; 【兜底防漏】如果经过上面还没被打上标签，剩下的纯净名字(比如 sg新加坡2)全归白嫖
rename_node=^([^\[].*)$@[白] $1


; --- 2. 第二步：提取有用信息并保护 ---
rename_node=(?i)0\.1(倍|x)@ [0.1x]
rename_node=(?i)(\d+)x@ [$1x]
rename_node=(?i)(\d+)倍@ [$1x]
rename_node=中转@ 中转 
rename_node=直连|白连@ 直连 
rename_node=高速专线|专线@ 专线 


; --- 3. 第三步：无情碎纸机（粉碎所有没用的废话） ---
rename_node=(?i)流媒体|电信|移动|联通|三网|推荐|优化|解锁|下载|专用|晚高峰|避免|合适|家宽|AnyTLS|tuic|hy2|Al-hy2|-hy2|GPT|Netflix|Google play|光速|-?1000M|V\d+@
rename_node=(?i)baipiaoyes\.top|baipiaoyes|bbyvpn@
rename_node=(?i)节点|更新|更换|客户端|地址|TG群|邀请|好友|返佣|25%|剩余|流量|套餐|到期|官网|测试|无法使用|长期有效|bit\.ly|t\.me|https?|://|如果只显示.*|请到.*教程.*|新一次订阅|修改host|Shadowrocket|能用HY@
rename_node=(?i)L[12]\s*\||福建专用|sgAWS|jpAWS|JPAWS|SGAWS|HKAWS@


; --- 4. 第四步：净化地区前缀 ---
rename_node=(?i)HK|SG|JP|TW|CN|US|KR|RU|CA|GB|DE|AU|AE|MY|IN|PH@
rename_node=深港@香港
rename_node=狮城@新加坡
rename_node=东京|大阪@日本
rename_node=新北@台湾
rename_node=洛杉矶|圣何塞|阿什本|亚特兰大|凤凰城@美国
rename_node=首尔@韩国


; --- 5. 第五步：斩草除根 (清理残留的乱七八糟字母) ---
rename_node=\]\s*[a-zA-Z\s]+(香港|新加坡|日本|台湾|美国|韩国|俄罗斯|加拿大|英国|德国|澳大利亚|迪拜|土耳其|阿根廷|泰国|马来西亚|印尼|印度|菲律宾|瑞士|越南|埃及|缅甸|巴西|尼日利亚|乌克兰|哈萨克斯坦|柬埔寨)@] $1


; --- 6. 第六步：终极强迫症排版 (强制插入空格) ---
; 删掉所有横杠和竖杠
rename_node=\||-@ 
; 确保标签后面有空格
rename_node=\]@] 
