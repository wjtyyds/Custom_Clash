;设置分组标志位


; =========================================
; 终极防翻车版流水线 (去Emoji纯中文版)
; =========================================

; --- 1. 贴标签 (放宽条件，包容各种空格和乱序) ---
rename_node=^([^\[].*L[12]\s*\|.*|[^\[].*福建专用.*)@[宝] $1
rename_node=^([^\[].*[A-Z]{2}AWS.*|[^\[].*0\.\d+(倍|x).*|[^\[].*晚高峰.*|[^\[].*专线.*|[^\[].*合适下载.*|[^\[].*下载专用.*)@[赔] $1
rename_node=^([^\[].*[a-z]{2}AWS.*|[^\[].*优化.*|[^\[].*解锁.*|[^\[].*AnyTLS.*|[^\[].*家宽.*|[^\[].*HK香港0\d+.*)@[牛] $1
rename_node=^([^\[].*Baipiaoyes.*|[^\[].*白嫖.*|[^\[].*HY\d*.*|[^\[].*光速.*|[^\[].*V666.*|^[A-Z]{2}[一-龥]+\d*$)@[白] $1

; --- 2. 无情清理前缀 (干掉 usus, sgAWSsg, L1 等所有杂音) ---
rename_node=\]\s*(L[12]\s*\||福建专用)@] 
rename_node=\]\s*[a-zA-Z]{2}AWS[a-zA-Z]*\s*@] 
; 【核心杀招】：把标签和中文地区之间的所有乱七八糟的英文字母全部删光！
rename_node=\]\s*[a-zA-Z]+\s*(香港|新加坡|日本|台湾|美国|韩国|俄罗斯|加拿大|英国|德国|澳大利亚|迪拜|土耳其|阿根廷|泰国|马来西亚|印尼|印度|菲律宾|瑞士|越南|埃及|缅甸|巴西)@] $1

; --- 3. 提取并格式化倍率 (雷打不动放进方括号) ---
rename_node=(?i)\s*\|?\s*\[?(\d+(\.\d+)?)(倍|x)\]?\s*@ | [$1x]

; --- 4. 规范化属性 (兼容所有语无伦次的推荐语) ---
rename_node=(中转|直连)\s*\|?\s*流媒体@$1 | 流媒体
rename_node=(?i)电信.*联通.*移动.*|电信.*移动.*联通.*|移动.*联通.*|电信.*联通.*|三网.*@三网优化
rename_node=流媒体解锁|解锁.*@解锁
rename_node=合适下载.*|下载专用.*@下载专用

; --- 5. 清理多余的协议尾巴 ---
rename_node=(?i)\|?\s*Al-hy2|-hy2@
rename_node=(?i)-Baipiaoyes.*@

; --- 6. 统一地区名称 (纯中文，最清爽) ---
rename_node=(?i)HK香港|香港HK|深港@香港
rename_node=(?i)SG新加坡|新加坡SG|狮城@新加坡
rename_node=(?i)JP日本东京|JP日本|日本东京|东京日本@日本
rename_node=(?i)TW台湾|CN台湾|台湾TW@台湾
rename_node=(?i)US美国洛杉矶|US美国圣何塞|US美国阿什本|US美国亚特兰大|US美国|美国US@美国
rename_node=(?i)KR韩国首尔|KR韩国@韩国

; --- 7. 终极排版修复 (强迫症对齐，干掉多余竖线) ---
rename_node=\|(\s*\|)+@|
