; =========================================
; 极致极简版：[机场] 地区 | 中转 | [倍率]
; =========================================

; --- 1. 识别并打上单字标签 ---
rename_node=^([^\[].*L[12]\s*\|.*|[^\[].*福建专用.*)@[宝] $1
rename_node=^([^\[].*[A-Z]{2}AWS.*|[^\[].*0\.\d+(倍|x).*|[^\[].*晚高峰.*|[^\[].*高速专线.*|[^\[].*合适下载.*)@[赔] $1
rename_node=^([^\[].*[a-z]{2}AWS.*|[^\[].*优化.*|[^\[].*解锁.*|[^\[].*AnyTLS.*|[^\[].*家宽.*|[^\[].*HK香港0\d+.*)@[牛] $1
rename_node=^([^\[].*Baipiaoyes.*|[^\[].*白嫖.*|[^\[].*HY\d*.*|[^\[].*光速.*|[^\[].*V666.*|^[A-Z]{2}[一-龥]+\d*$)@[白] $1

; --- 2. 清理恶心的机场前缀字符 (彻底解决 usus, sgAWS 等乱码) ---
rename_node=\]\s*(L[12]\s*\||福建专用)@] 
rename_node=\]\s*[a-zA-Z]{2}AWS[a-zA-Z]*\s*@] 
rename_node=\]\s*[a-zA-Z]+\s*(香港|新加坡|日本|台湾|美国|韩国|俄罗斯|加拿大|英国|德国|澳大利亚|迪拜|土耳其|阿根廷|泰国|马来西亚|印尼|印度|菲律宾|瑞士|越南|埃及|缅甸|巴西)@] $1

; --- 3. 提取核心信息：倍率与连接方式 (用 | 隔开) ---
rename_node=(?i)\s*\|?\s*-?\s*\[?(\d+(\.\d+)?)(倍|x)\]?\s*@ | [$1x]
rename_node=(?i)(中转|直连|专线)@ | $1 | 

; --- 4. 【核弹清理】无情删掉所有废话描述 ---
; 只要不是地区、中转或倍率，全都在这里被粉碎！
rename_node=(?i)流媒体|电信|移动|联通|三网|推荐|优化|解锁|下载|专用|晚高峰|避免|合适|家宽|AnyTLS|GPT|Netflix|Google play|Al-hy2|-hy2|hy2|Baipiaoyes|光速|V\d+|-1000M@
rename_node=(?i)节点|更新|更换|客户端|地址|TG群|邀请|好友|返佣|剩余|流量|套餐|到期|官网|测试|无法使用|升级|长期有效|bit\.ly|t\.me|https?|://@

; --- 5. 净化地区名称 ---
rename_node=(?i)HK|SG|JP|TW|CN|US|KR|RU|CA|GB|DE|AU|AE@
rename_node=深港@香港
rename_node=狮城@新加坡
rename_node=东京|大阪@日本
rename_node=新北@台湾
rename_node=洛杉矶|圣何塞|阿什本|亚特兰大|凤凰城@美国
rename_node=首尔@韩国

; --- 6. 最后的排版修复 (清理多余的符号) ---
; 把连字符替换为空格
rename_node=-+@ 
; 把因为删词导致的多余竖线清理干净
rename_node=[\|\s]+\|@|
rename_node=\s*\|\s*@ | 
rename_node=\s+\|\s*$@
; 让地区和数字之间有一个舒适的空格
rename_node=(香港|新加坡|日本|台湾|美国|韩国|英国|俄罗斯|加拿大|德国|澳大利亚|迪拜|土耳其|马来西亚|印尼|菲律宾)(\d+)@$1 $2