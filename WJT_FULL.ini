; --- 3. 第三步：无情碎纸机（删掉所有废话描述） ---
rename_node=(?i)流媒体|电信|移动|联通|三网|推荐|优化|解锁|下载|专用|晚高峰|避免|合适|家宽|AnyTLS|tuic|hy2|Al-hy2|-hy2|GPT|Netflix|Google play|光速|-1000M|V\d+@
